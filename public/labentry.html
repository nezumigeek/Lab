<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lab Entry Compliance Form</title>
  <style>
    body{font-family:system-ui,-apple-system,sans-serif;max-width:700px;margin:2rem auto;padding:1rem;background:#f7f7f7;}
    .card{background:white;padding:2rem;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
    
    .header-info { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
    
    select {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: 2px solid #ddd;
      background-color: #fff;
    }

    h2{margin-top:0;color:#333;line-height:1.4;min-height:80px}
    .controls{display:flex;flex-direction:column;gap:1rem;margin-top:2rem}
    .action-btn{padding:20px;font-size:1.2rem;font-weight:bold;border:none;border-radius:8px;cursor:pointer;transition:transform 0.1s}
    .action-btn:active{transform:scale(0.98)}
    
    #btn-yes{background:#3cb371;color:white}
    #btn-no{background:#e84a5f;color:white}
    #prev{background:transparent;color:#666;border:1px solid #ccc;padding:8px;margin-top:10px;font-size:0.9rem}
    .progress{color:#888;font-size:0.9rem;margin-bottom:10px;display:block}
  </style>
</head>
<body>
  <div class="card" id="quiz">
    <div class="header-info">
      <label for="personnel-select">Authorized Personnel:</label>
      <select id="personnel-select">
        <option value="" disabled selected>-- Select Your Name --</option>
        <option value="Person 1">Person 1</option> 
	    <option value="Person 2">Person 2</option>
        <option value="Person 3">Person 3</option>
      </select>
    </div>

    <span class="progress" id="progress">Requirement 1 of 12</span>
    <h2 id="q-title"></h2>

    <div class="controls">
      <button id="btn-yes" class="action-btn">YES - I Comply</button>
      <button id="btn-no" class="action-btn">NO - Non-Compliant</button>
      <button id="prev" style="display:none">Go back</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
